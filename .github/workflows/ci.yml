name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.15.21 bandit==1.9.4 pip-audit==2.10.1
      - name: Static and dependency checks
        run: |
          ruff check .
          bandit -q -r . -x ./tests
          pip-audit -r requirements.txt
      - name: Import check
        run: python -c "import bot, cogs.ai, cogs.help, md_knowledge, md_embeddings"
      - name: Apps Script syntax check
        run: node --check - < phanphoi.gs
      - name: Verify Apps Script customer email delivery paths
        run: node tests/test_customer_email_delivery.js
      - name: Run tests
        run: python -m unittest discover -s tests -v
